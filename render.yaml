services:
  # Backend: Node.js Web Service
  - type: web
    name: morgex-backend
    runtime: node
    plan: free
    rootDir: morgex-server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false # This tells Render to ask you for the value during setup
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5001

  # Frontend: Static Site (Uses type: web + runtime: static)
  - type: web
    name: morgex-frontend
    runtime: static
    plan: free
    rootDir: morgex-client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        # Automatic interpolation from the other service
        value: ${morgex-backend.url}/api
    # SPA Routing: Redirect all requests to index.html for React Router
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
