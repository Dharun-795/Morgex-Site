services:
  # Backend: Node.js Web Service
  - type: web
    name: morgex-backend
    runtime: node
    plan: free
    rootDir: morgex-server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        # Render will prompt you for this value
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5001

  # Frontend: Static Site
  - type: static
    name: morgex-frontend
    plan: free
    rootDir: morgex-client
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        # Pulls the backend URL automatically
        fromService:
          type: web
          name: morgex-backend
          property: url
    # SPA Routing: Redirect all requests to index.html for React Router
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
