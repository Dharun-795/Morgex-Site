services:
  # Backend: Node.js Web Service
  - type: web
    name: morgex-api
    runtime: node
    plan: free
    rootDir: morgex-server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false # Set this in Render Dashboard after creation
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5001

  # Frontend: Static Site (Uses type: web + runtime: static in Blueprints)
  - type: web
    name: morgex-web
    runtime: static
    plan: free
    rootDir: morgex-client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        # Automatic interpolation from the other service
        value: ${morgex-api.url}/api
